name: Playwright Regression Tests

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    name: Run regression suite
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Node.js với cache
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 3. Install npm dependencies
      - name: Install NPM dependencies
        run: npm ci
        timeout-minutes: 10

      # 4. Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      # 5. Install Playwright browsers with dependencies
      - name: Install Playwright browser dependencies
        run: npx playwright install --with-deps chromium
        timeout-minutes: 15

      # 6. Run regression tests
      - name: Run regression tests
        run: npx playwright test --reporter=list,allure-playwright
        timeout-minutes: 30

      # 7. Generate Allure report
      - name: Generate Allure report
        if: always()
        run: npx allure generate allure-results --clean -o allure-report
        timeout-minutes: 5

      # 8. Upload test results artifact
      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: allure-results/
          if-no-files-found: warn
          retention-days: 30

      # 9. Upload Allure report artifact
      - name: Upload Allure report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
          if-no-files-found: warn
          retention-days: 30

      # 10. Upload Playwright artifacts
      - name: Upload Playwright test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            test-results/
            playwright-report/
          if-no-files-found: warn
          retention-days: 30
